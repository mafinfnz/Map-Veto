<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Map Veto — CS2</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface-2: #fbfbfd;
    --text: #1d1d1f;
    --text-2: #6e6e73;
    --text-3: #aeaeb2;
    --hairline: rgba(0, 0, 0, .08);
    --blue: #0071e3;
    --blue-hover: #0077ed;
    --green: #248a3d;
    --green-soft: #e8f6ec;
    --red: #d70015;
    --red-soft: #fdeef0;
    --amber: #b25000;
    --amber-soft: #fdf3e7;
    --ct: #4d7bd6;
    --t: #d6a14d;
    --radius-l: 22px;
    --radius-m: 14px;
    --radius-s: 10px;
    --ease: cubic-bezier(.32, .72, 0, 1);
    --ease-out: cubic-bezier(.16, 1, .3, 1);
    --shadow-1: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.05);
    --shadow-2: 0 2px 6px rgba(0,0,0,.06), 0 16px 40px rgba(0,0,0,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; letter-spacing: -0.01em;
  }
  ::selection { background: rgba(0,113,227,.18); }

  /* ---------- переходы страниц ---------- */
  #app { transition: opacity .55s var(--ease), transform .55s var(--ease); }
  #app.leaving { opacity: 0; transform: translateY(12px) scale(.995); }
  #app.entering { opacity: 0; transform: translateY(16px); transition: none; }

  @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { 0% { opacity: 0; transform: scale(.92); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes breathe { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .55; transform: scale(.82); } }
  @keyframes stamp { 0% { transform: scale(1.18); opacity: 0; } 60% { transform: scale(.96); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes coinSpin {
    0% { transform: rotateY(0) scale(.6); opacity: 0; }
    60% { transform: rotateY(720deg) scale(1.05); opacity: 1; }
    100% { transform: rotateY(720deg) scale(1); opacity: 1; }
  }
  /* fill-mode: backwards — после завершения анимация отпускает элемент,
     иначе она перекрывает hover-transform (карточки не реагировали на наведение) */
  .stagger > * { animation: rise .8s var(--ease-out) backwards; }
  .stagger > *:nth-child(1) { animation-delay: .05s; }
  .stagger > *:nth-child(2) { animation-delay: .12s; }
  .stagger > *:nth-child(3) { animation-delay: .19s; }
  .stagger > *:nth-child(4) { animation-delay: .26s; }
  .stagger > *:nth-child(5) { animation-delay: .33s; }
  .stagger > *:nth-child(6) { animation-delay: .40s; }
  .stagger > *:nth-child(7) { animation-delay: .47s; }
  .stagger > *:nth-child(8) { animation-delay: .54s; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* ---------- шапка ---------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    background: rgba(251, 251, 253, .78); border-bottom: 1px solid var(--hairline);
  }
  .nav-inner {
    max-width: 980px; margin: 0 auto; padding: 0 22px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity .3s var(--ease); }
  .brand:hover { opacity: .7; }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
  .nav-user { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text-2); }
  .nav-user b { color: var(--text); font-weight: 600; }

  .container { max-width: 980px; margin: 0 auto; padding: 36px 22px 110px; }

  .hero-title { font-size: clamp(38px, 7vw, 62px); font-weight: 700; letter-spacing: -0.035em; line-height: 1.05; text-align: center; }
  .hero-title .accent {
    background: linear-gradient(100deg, #0071e3 10%, #40a0ff 55%, #6ec1ff 90%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-sub { text-align: center; color: var(--text-2); font-size: clamp(16px, 2.4vw, 20px); margin-top: 14px; line-height: 1.5; }
  h2.section { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 4px; }
  .section-sub { color: var(--text-2); font-size: 14px; margin-bottom: 18px; }

  .card {
    background: var(--surface); border-radius: var(--radius-l);
    box-shadow: var(--shadow-1); padding: 28px;
    transition: box-shadow .5s var(--ease), transform .5s var(--ease);
  }
  .card.hoverable:hover { box-shadow: var(--shadow-2); transform: translateY(-2px); }

  /* ---------- формы ---------- */
  .field { margin-bottom: 12px; }
  input {
    width: 100%; height: 50px; padding: 0 16px; border-radius: var(--radius-s);
    border: 1px solid var(--hairline); background: var(--surface-2);
    color: var(--text); font-size: 16px; font-family: inherit; outline: none; appearance: none;
    transition: border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);
  }
  input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,113,227,.12); }
  input::placeholder { color: var(--text-3); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 50px; padding: 0 24px; border: none; cursor: pointer; border-radius: 980px;
    background: var(--blue); color: #fff; font-size: 16px; font-weight: 500; font-family: inherit;
    transition: background .3s var(--ease), transform .25s var(--ease), opacity .3s var(--ease);
  }
  .btn:hover { background: var(--blue-hover); transform: scale(1.015); }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: default; transform: none; }
  .btn.full { width: 100%; }
  .btn.quiet { background: rgba(0,0,0,.05); color: var(--text); }
  .btn.quiet:hover { background: rgba(0,0,0,.08); }
  .btn.link { background: none; color: var(--blue); height: auto; padding: 0; font-size: 14px; }
  .btn.link:hover { text-decoration: underline; transform: none; }
  .btn.danger { background: var(--red-soft); color: var(--red); }

  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; height: 50px; cursor: pointer; border-radius: 980px;
    border: 1px solid var(--hairline); background: #fff; color: var(--text);
    font-size: 16px; font-weight: 500; font-family: inherit;
    transition: background .3s var(--ease), transform .25s var(--ease), box-shadow .3s var(--ease);
  }
  .btn-google:hover { background: var(--surface-2); box-shadow: var(--shadow-1); transform: scale(1.015); }

  .divider { display: flex; align-items: center; gap: 14px; color: var(--text-3); font-size: 13px; margin: 18px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--hairline); }

  .segment { display: flex; background: rgba(0,0,0,.05); border-radius: var(--radius-s); padding: 3px; position: relative; }
  .segment button {
    flex: 1; height: 40px; border: none; background: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-2);
    border-radius: 8px; position: relative; z-index: 1; transition: color .35s var(--ease);
  }
  .segment button.on { color: var(--text); font-weight: 600; }
  .segment .thumb {
    position: absolute; top: 3px; bottom: 3px; left: 3px;
    background: #fff; border-radius: 8px; box-shadow: var(--shadow-1);
    transition: transform .45s var(--ease); will-change: transform;
  }
  .segment.n2 .thumb { width: calc(50% - 3px); }
  .segment.n2[data-i="1"] .thumb { transform: translateX(100%); }
  .segment.n3 .thumb { width: calc(33.333% - 2px); }
  .segment.n3[data-i="1"] .thumb { transform: translateX(100%); }
  .segment.n3[data-i="2"] .thumb { transform: translateX(200%); }

  .fmt-info {
    background: var(--surface-2); border: 1px solid var(--hairline);
    border-radius: var(--radius-s); padding: 14px 16px; margin: 12px 0 16px;
    transition: opacity .3s var(--ease);
  }
  .fmt-info .fi-title { font-size: 14px; font-weight: 650; }
  .fmt-info .fi-text { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-top: 4px; }

  .form-msg { min-height: 20px; font-size: 14px; color: var(--red); margin-bottom: 8px; }

  /* текст кнопки входа: скользящая смена в направлении ползунка */
  .btn-label { display: inline-block; transition: transform .4s var(--ease), opacity .4s var(--ease); }
  .btn-label.slide-out-left  { transform: translateX(-26px); opacity: 0; transition-duration: .22s; }
  .btn-label.slide-out-right { transform: translateX(26px);  opacity: 0; transition-duration: .22s; }
  .btn-label.slide-in-left   { transform: translateX(26px);  opacity: 0; transition: none; }
  .btn-label.slide-in-right  { transform: translateX(-26px); opacity: 0; transition: none; }

  /* ---------- настройка команды (организатор) ---------- */
  .team-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 6px; }
  @media (max-width: 680px) { .team-setup { grid-template-columns: 1fr; } }
  .ts-box {
    background: var(--surface-2); border: 1px solid var(--hairline);
    border-radius: var(--radius-m); padding: 16px;
  }
  .ts-box .ts-label { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: var(--text-3); margin-bottom: 10px; }
  .logo-upload {
    display: flex; align-items: center; gap: 12px; margin-top: 10px;
    border: 1px dashed var(--hairline); background: #fff;
    border-radius: var(--radius-s); padding: 10px 12px; cursor: pointer;
    transition: border-color .3s var(--ease);
  }
  .logo-upload:hover { border-color: var(--blue); }
  .lu-preview {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    background-color: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); font-size: 20px;
    border: 1px dashed var(--hairline);
  }
  .lu-preview.has-img { border: none; }
  .lu-text { font-size: 12px; color: var(--text-2); line-height: 1.4; }
  .lu-text b { color: var(--text); font-size: 13px; }

  /* ---------- ссылки матча ---------- */
  .link-card {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: var(--surface-2); border: 1px solid var(--hairline);
    border-radius: var(--radius-m); padding: 16px 18px; margin-bottom: 10px;
  }
  .link-card .lk-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 19px; color: #fff;
  }
  .link-card .lk-body { flex: 1; min-width: 160px; }
  .link-card .lk-title { font-size: 15px; font-weight: 650; }
  /* иконки в карточках ссылок: один размер у всех — текст в одну линию */
  .link-card .tlogo.s32 { width: 38px; height: 38px; font-size: 18px; }

  /* ---------- список матчей ---------- */
  .match-row {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 18px 20px; border-radius: var(--radius-m);
    background: var(--surface); box-shadow: var(--shadow-1);
    cursor: pointer; margin-bottom: 10px;
    transition: transform .4s var(--ease), box-shadow .4s var(--ease);
  }
  .match-row:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
  .match-row .title { font-weight: 600; font-size: 16px; }
  .match-row .meta { color: var(--text-2); font-size: 13px; margin-top: 3px; }
  .chip { font-size: 12px; font-weight: 600; padding: 6px 13px; border-radius: 980px; white-space: nowrap; }
  .chip.veto { background: var(--green-soft); color: var(--green); }
  .chip.done { background: rgba(0,113,227,.1); color: var(--blue); }

  /* ---------- логотипы и матчап ---------- */
  .tlogo {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 14px; flex-shrink: 0; user-select: none;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    background-color: transparent;
  }
  .tlogo.s32 { width: 34px; height: 34px; font-size: 16px; border-radius: 9px; }
  .tlogo.s56 { width: 58px; height: 58px; font-size: 26px; }
  .tlogo.s88 { width: 90px; height: 90px; font-size: 42px; border-radius: 22px; }

  .matchup-hero { text-align: center; padding: 6px 0 2px; }
  .mh-row { display: flex; align-items: flex-start; justify-content: center; gap: clamp(16px, 5vw, 44px); }
  .mh-team { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; max-width: 200px; }
  .mh-team .mh-name {
    font-size: clamp(16px, 3vw, 21px); font-weight: 700; letter-spacing: -0.02em;
    word-break: break-word; line-height: 1.25;
    /* фикс кривизны: имя всегда занимает 2 строки по высоте — бейджи на одном уровне */
    min-height: 2.5em; display: flex; align-items: flex-start; justify-content: center;
  }
  .mh-team.turn-glow .tlogo { box-shadow: 0 0 0 3px var(--green), 0 8px 24px rgba(36,138,61,.25); }
  /* VS по центру логотипов (логотип 90px → центр на 45px) */
  .mh-vs { font-size: 13px; font-weight: 700; letter-spacing: .22em; color: var(--text-3); margin-top: 38px; }
  .mh-state { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 980px; background: rgba(0,0,0,.04); color: var(--text-3); }
  .mh-state.on { background: var(--green-soft); color: var(--green); }

  /* ---------- статус и таймлайн ---------- */
  .status-bar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 22px auto 6px; padding: 14px 24px; max-width: 620px;
    border-radius: var(--radius-m); font-size: 15px; font-weight: 500; text-align: center;
    background: rgba(0,0,0,.04); color: var(--text-2);
    transition: background .5s var(--ease), color .5s var(--ease);
  }
  .status-bar.me { background: var(--green-soft); color: var(--green); }
  .status-bar .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; animation: breathe 1.6s ease-in-out infinite; }

  /* пошаговый таймлайн veto */
  .timeline {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    max-width: 640px; margin: 16px auto 0;
    position: relative; /* для скользящего бегунка */
  }
  /* скользящая рамка текущего шага — едет как ползунок сегмента */
  .tl-runner {
    position: absolute; z-index: 2; pointer-events: none;
    border: 2px solid var(--blue); border-radius: 13px; /* радиус плитки 10 + отступ 3 */
    box-shadow: 0 0 0 3px rgba(0,113,227,.13);
    opacity: 0;
    transition: left .55s var(--ease), top .55s var(--ease),
                width .55s var(--ease), height .55s var(--ease),
                opacity .4s var(--ease);
    will-change: left, top;
  }
  .tl-step {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--text-3);
    padding: 7px 9px; border-radius: 10px; background: var(--surface-2);
    border: 1px solid var(--hairline); min-width: 52px;
    transition: all .4s var(--ease);
  }
  .tl-step .tl-team { font-size: 10px; font-weight: 600; color: var(--text-3); max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tl-step.done-ban { border-color: rgba(215,0,21,.25); }
  .tl-step.done-ban .tl-type { color: var(--red); }
  .tl-step.done-pick { border-color: rgba(36,138,61,.3); }
  .tl-step.done-pick .tl-type { color: var(--green); }
  .tl-step.done-side { border-color: rgba(178,80,0,.3); }
  .tl-step.done-side .tl-type { color: var(--amber); }
  /* текущий шаг: рамку рисует скользящий бегунок, тут только акцент текста */
  .tl-step.now { background: #fff; }
  .tl-step.now .tl-type { color: var(--blue); }

  .progress { height: 4px; border-radius: 4px; background: rgba(0,0,0,.06); max-width: 620px; margin: 16px auto 0; overflow: hidden; }
  .progress i { display: block; height: 100%; border-radius: 4px; background: var(--blue); transition: width .8s var(--ease); }

  /* ---------- выбор стороны ---------- */
  .side-pick { display: flex; gap: 14px; max-width: 460px; margin: 22px auto 4px; animation: popIn .5s var(--ease-out) both; }
  .side-btn {
    flex: 1; padding: 22px 10px; border-radius: var(--radius-m); border: 2px solid var(--hairline);
    background: var(--surface); cursor: pointer; font-family: inherit; text-align: center;
    transition: transform .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease);
  }
  .side-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-2); }
  .side-btn:active { transform: scale(.96); }
  .side-btn .s-big { font-size: 26px; font-weight: 800; }
  .side-btn .s-sub { font-size: 13px; color: var(--text-2); margin-top: 4px; }
  .side-btn.ct:hover { border-color: var(--ct); }
  .side-btn.ct .s-big { color: var(--ct); }
  .side-btn.t:hover { border-color: var(--t); }
  .side-btn.t .s-big { color: var(--t); }

  /* ---------- сетка карт ---------- */
  .maps { display: grid; gap: 14px; margin-top: 26px; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); }
  .map {
    position: relative; border-radius: var(--radius-m); overflow: hidden;
    background: var(--surface); box-shadow: var(--shadow-1);
    transition: box-shadow .5s var(--ease), transform .45s var(--ease);
  }
  .map .art {
    height: 100px; position: relative; overflow: hidden;
    background-size: cover; background-position: center;
    transition: filter .6s var(--ease);
  }
  /* внутренний слой с картинкой — для плавного зума при наведении */
  .map .art .art-img {
    position: absolute; inset: 0;
    background-image: inherit; background-size: cover; background-position: center;
    transform: scale(1); transition: transform .9s var(--ease-out), filter .7s var(--ease);
    filter: saturate(.96);
  }
  /* блик, пробегающий по превью */
  .map .art .sheen {
    position: absolute; top: 0; bottom: 0; left: -80%; width: 60%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.35), transparent);
    transform: skewX(-18deg); opacity: 0; pointer-events: none;
    transition: none;
  }
  .map .art::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 40%, rgba(0,0,0,.16));
    transition: background .6s var(--ease);
  }
  .map .name { padding: 12px 14px 4px; font-weight: 600; font-size: 16px; transition: color .5s var(--ease); }
  .map .state { padding: 0 14px 12px; font-size: 12px; font-weight: 500; color: var(--text-3); min-height: 28px; display: flex; align-items: center; flex-wrap: wrap; gap: 3px; }
  .map.clickable { cursor: pointer; }
  .map.clickable:hover {
    transform: translateY(-6px) scale(1.015);
    box-shadow: 0 0 0 2px rgba(0,113,227,.45), 0 18px 44px rgba(0,0,0,.16);
  }
  /* при бане ховер красный, при пике — зелёный */
  .map.clickable.mode-ban:hover { box-shadow: 0 0 0 2px rgba(215,0,21,.5), 0 18px 44px rgba(0,0,0,.16); }
  .map.clickable.mode-ban:hover .name { color: var(--red); }
  .map.clickable.mode-ban .state { color: var(--red); }
  .map.clickable.mode-pick:hover { box-shadow: 0 0 0 2px rgba(36,138,61,.55), 0 18px 44px rgba(0,0,0,.16); }
  .map.clickable.mode-pick:hover .name { color: var(--green); }
  .map.clickable.mode-pick .state { color: var(--green); }
  .map.clickable:active { transform: translateY(-2px) scale(.975); transition-duration: .15s; }
  .map.clickable .state { color: var(--blue); }
  /* зум превью + лёгкое осветление */
  .map.clickable:hover .art .art-img { transform: scale(1.10); filter: saturate(1.12) brightness(1.05); }
  /* пробегающий блик */
  @keyframes sheenRun { from { left: -80%; opacity: 1; } to { left: 130%; opacity: 0; } }
  .map.clickable:hover .art .sheen { animation: sheenRun .9s var(--ease-out) .05s 1 both; }
  /* название чуть сдвигается и синеет */
  .map .name { transition: color .4s var(--ease), transform .45s var(--ease); }
  .map.clickable:hover .name { color: var(--blue); transform: translateX(3px); }

  /* бан: красная рамка + вуаль, без смещения */
  .map.banned { box-shadow: 0 0 0 2px rgba(215,0,21,.5), var(--shadow-1); }
  .map.banned .art { filter: grayscale(.85) brightness(.94); }

  <svg width="11" height="9" viewBox="0 0 12 10" fill="none"><path d="M1 5.5L4.2 8.5L11 1.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</span><span id="toast-text"></span></div>

<script>
const $ = s => document.querySelector(s);
let me = null, myAvatar = 0;
let pollTimer = null;
let googleClientId = null;
let lastRenderKey = '';
let finalShown = false;     // показывали ли финальный оверлей в этой сессии страницы
let captainToken = null;    // токен капитана из URL
let spectateCode = null;    // код наблюдателя из URL

const AVATARS = [
  { e: '🐺', g: ['#5b6b7c', '#90a4b8'] }, { e: '🦊', g: ['#c96a3b', '#e9a06b'] },
  { e: '🐻', g: ['#7a5c43', '#a98a68'] }, { e: '🦅', g: ['#4a5d73', '#7e95ad'] },
  { e: '🐯', g: ['#c98a2e', '#e8b85e'] }, { e: '🐉', g: ['#3e7a55', '#6fae87'] },
  { e: '👻', g: ['#6d6d80', '#a3a3b8'] }, { e: '🤖', g: ['#4a7d8c', '#7fb3c2'] },
  { e: '💀', g: ['#5a5a5a', '#929292'] }, { e: '🔥', g: ['#c2502e', '#e8845e'] },
  { e: '⚡', g: ['#b09134', '#dcc06a'] }, { e: '❄️', g: ['#4f7fa8', '#86b4d8'] },
];
function avaHTML(idx, size) {
  const a = AVATARS[idx ?? 0] || AVATARS[0];
  return `<span class="ava ${size}" style="background:linear-gradient(135deg,${a.g[0]},${a.g[1]})">${a.e}</span>`;
}

const MAP_IMG = id => `/img/maps/${id}.jpg`;

const FORMAT_INFO = {
  BO1: { title: 'Best of 1 · одна карта', text: 'Команды по очереди банят карты. Последняя оставшаяся будет сыграна, стороны разыграет монетка.' },
  BO3: { title: 'Best of 3 · до 2 побед', text: 'Бан–бан, затем каждая команда пикает карту (соперник выбирает сторону на ней), оставшиеся баны — и решающая карта с монеткой.' },
  BO5: { title: 'Best of 5 · до 3 побед', text: 'Три бана, четыре пика со сторонами от соперника, последняя карта — решающая с монеткой.' },
};

/* ------------------------------------------------ API + утилиты */
async function api(path, opts = {}) {
  const r = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || 'Ошибка');
  return data;
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stopPoll() { clearInterval(pollTimer); pollTimer = null; lastRenderKey = ''; }

let toastTimer = null;
function toast(msg, ok = false) {
  const t = $('#toast');
  $('#toast-text').textContent = msg;
  t.classList.toggle('ok', ok);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

function setPage(html, after) {
  const app = $('#app');
  app.classList.add('leaving');
  setTimeout(() => {
    app.innerHTML = html;
    app.classList.remove('leaving');
    app.classList.add('entering');
    requestAnimationFrame(() => requestAnimationFrame(() => app.classList.remove('entering')));
    tlRunnerEl = null;          // новая страница — бегунок ставим заново
    placeTlRunner();
    if (after) after();
  }, 400);
}
function setPageInstant(html, after) {
  $('#app').innerHTML = html;
  placeTlRunner();              // live-обновление: бегунок плавно переезжает
  if (after) after();
}

async function copyText(text, okMsg) {
  let copied = false;
  if (navigator.clipboard) { try { await navigator.clipboard.writeText(text); copied = true; } catch (e) {} }
  if (!copied) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
      document.body.appendChild(ta); ta.focus(); ta.select();
      copied = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (e) {}
  }
  toast(copied ? okMsg : text, copied);
}

/* Логотип: data-URL или заглушка с буквой. Без подложек — как загрузили, так и показываем */
function logoHTML(logoObj, size, teamName) {
  const logo = logoObj && typeof logoObj === 'object' ? logoObj.url : logoObj;
  if (logo) {
    return `<span class="tlogo ${size}" style="background-image:url('${logo}');background-size:contain;background-repeat:no-repeat;background-position:center;box-shadow:none;"></span>`;
  }
  const letter = (teamName || '?').trim().charAt(0).toUpperCase() || '?';
  return `<span class="tlogo ${size}" style="background:linear-gradient(135deg,#5b6b7c,#90a4b8);color:#fff;font-weight:700;">${esc(letter)}</span>`;
}

function readLogoFile(file) {
  return new Promise((resolve, reject) => {
    if (!file) return reject(new Error('Файл не выбран'));
    if (!/^image\/(png|jpeg|webp)$/.test(file.type)) return reject(new Error('Нужна картинка PNG, JPG или WebP'));
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      // Вписываем картинку целиком (contain), ничего не срезая;
      // PNG сохраняем с прозрачностью, никакого фона не запекаем
      const fit = Math.min(256 / img.width, 256 / img.height);
      const fw = img.width * fit, fh = img.height * fit;
      ctx.drawImage(img, (256 - fw) / 2, (256 - fh) / 2, fw, fh);

      // Обрезаем прозрачные поля: находим границы видимых пикселей,
      // чтобы логотип заполнял плитку одинаково у всех команд
      try {
        const d = ctx.getImageData(0, 0, 256, 256);
        let minX = 256, minY = 256, maxX = -1, maxY = -1;
        for (let y = 0; y < 256; y++) {
          for (let x = 0; x < 256; x++) {
            if (d.data[(y * 256 + x) * 4 + 3] > 12) {
              if (x < minX) minX = x; if (x > maxX) maxX = x;
              if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
          }
        }
        if (maxX > minX && maxY > minY) {
          const bw = maxX - minX + 1, bh = maxY - minY + 1;
          // Нормализуем по ВИЗУАЛЬНОЙ МАССЕ (среднему геометрическому сторон),
          // а не по большей стороне — иначе широкие логотипы выглядят мельче квадратных
          const targetMass = 256 * 0.80;                 // желаемый «средний размер»
          let scale = targetMass / Math.sqrt(bw * bh);
          const maxScale = (256 * 0.97) / Math.max(bw, bh); // но не вылезаем за холст
          if (scale > maxScale) scale = maxScale;
          const c3 = document.createElement('canvas');
          c3.width = c3.height = 256;
          const ctx3 = c3.getContext('2d');
          ctx3.drawImage(c, minX, minY, bw, bh,
            (256 - bw * scale) / 2, (256 - bh * scale) / 2, bw * scale, bh * scale);
          c.getContext('2d').clearRect(0, 0, 256, 256);
          c.getContext('2d').drawImage(c3, 0, 0);
        }
      } catch (e) {}

      // Анализ яркости видимых пикселей: если логотип в основном светлый —
      // помечаем его, чтобы дать тёмную подложку (иначе белое на белом)
      let light = false;
      try {
        const d = ctx.getImageData(0, 0, 256, 256).data;
        let sum = 0, n = 0;
        for (let i = 0; i < d.length; i += 16) { // каждый 4-й пиксель
          const a = d[i + 3];
          if (a > 40) { sum += (d[i] * .299 + d[i + 1] * .587 + d[i + 2] * .114); n++; }
        }
        if (n > 0 && sum / n > 178) light = true;
      } catch (e) {}

      const isPng = file.type !== 'image/jpeg';
      const dataUrl = isPng ? c.toDataURL('image/png') : c.toDataURL('image/jpeg', 0.85);
      if (dataUrl.length > 240000) {
        // слишком тяжёлый PNG — пережмём в WebP/JPEG c белым… нет, с тёмным не запекаем:
        // просто уменьшаем размер холста
        const c2 = document.createElement('canvas');
        c2.width = c2.height = 128;
        c2.getContext('2d').drawImage(c, 0, 0, 128, 128);
        return resolve({ dataUrl: c2.toDataURL(isPng ? 'image/png' : 'image/jpeg', 0.8), light });
      }
      resolve({ dataUrl, light });
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Не удалось прочитать картинку')); };
    img.src = url;
  });
}

/* ------------------------------------------------ Google Sign-In */
function initGoogleButton() {
  const slot = $('#google-slot');
  if (!slot) return;
  if (!googleClientId) {
    slot.innerHTML = `<p style="font-size:13px;color:var(--text-3);text-align:center;line-height:1.5;">
      Вход через Google не настроен.<br>Добавьте <b>GOOGLE_CLIENT_ID</b> на сервере.</p>`;
    return;
  }
  slot.innerHTML = `
    <button class="btn-google" id="g-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      Войти через Google
    </button>`;
  const start = () => {
    google.accounts.id.initialize({
      client_id: googleClientId,
      callback: async (resp) => {
        try {
          const d = await api('/api/auth/google', { method: 'POST', body: { credential: resp.credential } });
          me = d.username; myAvatar = d.avatar || 0;
          renderUserbox(); renderDashboard();
          toast(`Добро пожаловать, ${d.username}!`, true);
        } catch (e) { toast(e.message); }
      },
    });
    $('#g-btn').onclick = () => google.accounts.id.prompt();
    google.accounts.id.renderButton($('#g-btn'), { type: 'standard', theme: 'outline', size: 'large', width: 320 });
  };
  if (window.google && google.accounts) start();
  else {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.async = true; s.onload = start;
    s.onerror = () => { const b = $('#g-btn'); if (b) b.onclick = () => toast('Не удалось загрузить Google SDK'); };
    document.head.appendChild(s);
  }
}

/* ------------------------------------------------ Авторизация организатора */
let authMode = 'login';

function renderAuth() {
  authMode = 'login';
  setPage(`
    <div>
      <div style="padding: 40px 0 36px;">
        <h1 class="hero-title">Map Veto.<br><span class="accent">Как на турнирах.</span></h1>
        <p class="hero-sub">Организатор создаёт матч и отправляет капитанам ссылки.<br>Команды банят и пикают — зрители смотрят в реальном времени.</p>
      </div>
      <div class="card" style="max-width:400px;margin:0 auto;">
        <p style="font-size:13px;color:var(--text-3);text-align:center;margin-bottom:16px;">Вход для организатора матча</p>
        <div class="segment n2" id="auth-seg" data-i="0" style="margin-bottom:22px;">
          <div class="thumb"></div>
          <button class="on" onclick="switchAuth('login')">Вход</button>
          <button onclick="switchAuth('register')">Регистрация</button>
        </div>
        <div>
          <div class="form-msg" id="auth-err"></div>
          <div class="field"><input id="username" placeholder="Логин" autocomplete="username"></div>
          <div class="field"><input id="password" type="password" placeholder="Пароль" autocomplete="current-password"></div>
          <button class="btn full" id="auth-btn" style="overflow:hidden;"><span class="btn-label" id="auth-btn-label">Войти</span></button>
        </div>
        <div class="divider">или</div>
        <div id="google-slot"></div>
      </div>
      <p style="text-align:center;color:var(--text-3);font-size:13px;margin-top:22px;line-height:1.6;">
        Капитан или зритель? Вам не нужен аккаунт —<br>просто откройте ссылку, которую прислал организатор.
      </p>
    </div>`, () => {
    bindAuthForm();
    initGoogleButton();
  });
}

function switchAuth(mode) {
  if (mode === authMode) return;
  const toRight = mode === 'register';   // ползунок едет вправо
  authMode = mode;
  const seg = $('#auth-seg');
  seg.dataset.i = mode === 'login' ? '0' : '1';
  seg.querySelectorAll('button').forEach((b, i) => b.classList.toggle('on', (mode === 'login') === (i === 0)));
  $('#auth-err').textContent = '';

  // Поля логин/пароль НЕ трогаем — введённое сохраняется.
  // Меняется только текст кнопки: уезжает в сторону движения ползунка,
  // новый текст приезжает с противоположной стороны.
  const label = $('#auth-btn-label');
  label.classList.add(toRight ? 'slide-out-left' : 'slide-out-right');
  setTimeout(() => {
    label.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
    label.classList.remove('slide-out-left', 'slide-out-right');
    label.classList.add(toRight ? 'slide-in-left' : 'slide-in-right');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      label.classList.remove('slide-in-left', 'slide-in-right');
    }));
  }, 220);
}

function bindAuthForm() {
  const submit = async () => {
    const btn = $('#auth-btn');
    btn.disabled = true;
    try {
      const d = await api(authMode === 'login' ? '/api/login' : '/api/register', {
        method: 'POST',
        body: { username: $('#username').value.trim(), password: $('#password').value },
      });
      me = d.username; myAvatar = d.avatar || 0;
      renderUserbox(); renderDashboard();
    } catch (e) { $('#auth-err').textContent = e.message; btn.disabled = false; }
  };
  $('#auth-btn').onclick = submit;
  $('#password').onkeydown = e => { if (e.key === 'Enter') submit(); };
}

let logoA = null, logoB = null;

function renderDashboard() {

  setPage(`
    <div>
      <div class="card" style="margin-bottom:18px;">
        <h2 class="section">Новый матч</h2>

function pickFormat(fmt, i) {

async function loadMatches() {
  try {
    const list = await api('/api/matches');
    const el = $('#match-list');
    if (!el) return;
    const key = JSON.stringify(list.map(m => [m.id, m.status, m.stepIndex]));
    if (key === lastRenderKey) return;
    lastRenderKey = key;
    if (!list.length) { el.innerHTML = '<div class="empty">Пока нет матчей — создайте первый.</div>'; return; }
    el.innerHTML = list.map(m => `
      <div class="match-row" onclick="openOrganizerMatch('${m.id}')">
        <div style="display:flex;align-items:center;gap:12px;">
          ${logoHTML(m.teamA.logo, 's32', m.teamA.name)}
          <div>
            <div class="title">${esc(m.teamA.name)} vs ${esc(m.teamB.name)}</div>
            <div class="meta">${m.format} · шаг ${m.stepIndex}/${m.totalSteps}</div>
          </div>
        </div>
        <span class="chip ${m.status}">${m.status === 'done' ? 'Завершён' : 'Идёт VETO'}</span>
      </div>`).join('');
  } catch (e) { if (e.message === 'Требуется вход') { me = null; renderAuth(); } }
}

async function createMatch() {
  const btn = event.target; btn.disabled = true;
  try {
    const m = await api('/api/matches', { method: 'POST', body: {
      teamAName: $('#team-a-name').value,
      teamALogo: logoA,
      teamBName: $('#team-b-name').value,
      teamBLogo: logoB,
      format: chosenFormat,
    } });
    openOrganizerMatch(m.id);
  } catch (e) { $('#create-err').textContent = e.message; btn.disabled = false; }
}

/* --- страница матча у организатора: 3 ссылки + live-просмотр --- */
async function openOrganizerMatch(id) {
  stopPoll();
  try {
    const m = await api('/api/matches/' + id);
    lastRenderKey = renderKeyOf(m);
    finalShown = m.status === 'done'; // не показываем оверлей при повторном открытии
    setPage(organizerHTML(m, true));
    pollTimer = setInterval(async () => {
      try {
        const mm = await api('/api/matches/' + id);
        const key = renderKeyOf(mm);
        if (key === lastRenderKey) return;
        lastRenderKey = key;
        maybeShowFinal(mm);
        setPageInstant(organizerHTML(mm, false));
      } catch (e) {}
    }, 2000);
  } catch (e) { toast(e.message); }
}

function organizerHTML(m, animate) {
  const base = location.origin;
  const links = [
    { logo: logoHTML(m.teamA.logo, 's32', m.teamA.name), title: `Отправьте капитану ${esc(m.teamA.name)}`, url: `${base}/veto/${m.tokenA}` },

    { logo: '<span class="tlogo s32" style="background-image:url(\'/img/tv.png\');background-size:contain;background-repeat:no-repeat;background-position:center;"></span>', title: 'Ссылка для всех наблюдателей', url: `${base}/watch/${m.code}` },

              <div class="lk-title">${l.title}</div>
            </div>
            <button class="btn quiet" style="height:40px;padding:0 18px;font-size:14px;" onclick="copyText('${l.url}', 'Ссылка скопирована')">Копировать</button>
          </div>`).join('')}
      </div>
      ${vetoBodyHTML(m, animate, true)}
    </div>`;
}

/* ------------------------------------------------ Общие блоки */
function renderKeyOf(m) { return JSON.stringify([m.status, m.stepIndex]); }
function tn(m, t) { return t === 'A' ? m.teamA.name : m.teamB.name; }

/* шапка-матчап: логотип + название, БЕЗ Team A/B */
function matchupHero(m) {
  const turnA = m.status === 'veto' && m.currentStep && m.currentStep.team === 'A';
  const turnB = m.status === 'veto' && m.currentStep && m.currentStep.team === 'B';
  const state = t => m.status === 'done'
    ? '<span class="mh-state">Завершено</span>'
    : (t ? '<span class="mh-state on">Ходит</span>' : '<span class="mh-state">Ожидает</span>');
  return `
    <div class="matchup-hero">
      <div class="mh-row">
        <div class="mh-team ${turnA ? 'turn-glow' : ''}">
          ${logoHTML(m.teamA.logo, 's88', m.teamA.name)}
          <span class="mh-name">${esc(m.teamA.name)}</span>
          ${state(turnA)}
        </div>
        <span class="mh-vs">VS</span>
        <div class="mh-team ${turnB ? 'turn-glow' : ''}">
          ${logoHTML(m.teamB.logo, 's88', m.teamB.name)}
          <span class="mh-name">${esc(m.teamB.name)}</span>
          ${state(turnB)}
        </div>
      </div>
      <p style="color:var(--text-3);font-size:13px;margin-top:14px;">${m.format}</p>
    </div>`;
}

/* таймлайн всех шагов veto — видно, что было и что будет */
function timelineHTML(m) {
  const t = { ban: 'БАН', pick: 'ПИК', side: 'СТОРОНА' };
  return `
    <div class="timeline" id="tl">
      <div class="tl-runner" id="tl-runner"></div>
      ${m.sequence.map((s, i) => {
        const done = i < m.stepIndex;
        const now = i === m.stepIndex && m.status === 'veto';
        return `
          <div class="tl-step ${done ? 'done-' + s.type : ''} ${now ? 'now' : ''}">
            <span class="tl-type">${t[s.type]}</span>
            <span class="tl-team">${esc(tn(m, s.team))}</span>
          </div>`;
      }).join('')}
    </div>`;
}

/* Скользящий бегунок таймлайна.
   Чтобы он ПЛАВНО переезжал между шагами (а не появлялся заново),
   при перерисовке переносим прежний DOM-узел бегунка в новый таймлайн:
   transition отрабатывает от старых координат к новым. */
let tlRunnerEl = null;
function placeTlRunner() {
  const tl = document.getElementById('tl');
  if (!tl) { tlRunnerEl = null; return; }

  // переносим существующий бегунок (его inline-координаты сохраняются —
  // transition отыграет от старого места к новому)
  const freshRunner = document.getElementById('tl-runner');
  if (tlRunnerEl && tlRunnerEl !== freshRunner) {
    freshRunner.remove();
    tl.prepend(tlRunnerEl);
    void tlRunnerEl.offsetWidth; // принудительный reflow: фиксируем старую позицию
  } else {
    tlRunnerEl = freshRunner;
  }

  const now = tl.querySelector('.tl-step.now');
  if (!now) { tlRunnerEl.style.opacity = '0'; return; }

  const pad = 3; // рамка чуть больше плитки
  const left = now.offsetLeft - pad;
  const top = now.offsetTop - pad;
  const w = now.offsetWidth + pad * 2;
  const h = now.offsetHeight + pad * 2;

  // первый показ — ставим без анимации
  const firstShow = tlRunnerEl.style.opacity !== '1';
  if (firstShow) tlRunnerEl.style.transition = 'none';
  tlRunnerEl.style.left = left + 'px';
  tlRunnerEl.style.top = top + 'px';
  tlRunnerEl.style.width = w + 'px';
  tlRunnerEl.style.height = h + 'px';
  tlRunnerEl.style.opacity = '1';
  if (firstShow) {
    requestAnimationFrame(() => requestAnimationFrame(() => { tlRunnerEl.style.transition = ''; }));
  }
}
window.addEventListener('resize', () => placeTlRunner());

function mapCard(mp, m, readOnly) {
  const action = m.actions.find(a => a.type !== 'side' && a.map === mp.id);
  const sideAct = m.actions.find(a => a.type === 'side' && a.map === mp.id);
  const isDecider = m.finalMaps && m.finalMaps.some(f => f.map === mp.id && f.pickedBy === 'decider');
  const isSideStep = m.currentStep && m.currentStep.type === 'side';
  const awaitingSide = isSideStep && m.sideForMap === mp.id;
  const clickable = !readOnly && m.yourTurn && !isSideStep && !action;

  let cls = 'map', state = '&nbsp;', tag = '';
  if (action && action.type === 'ban') {
    cls += ' banned'; state = `Бан · ${esc(tn(m, action.team))}`;
    tag = '<span class="tag ban">BAN</span>';
  } else if (awaitingSide) {
    cls += ' awaiting-side'; state = 'Выбор стороны…';
    tag = '<span class="tag sd">SIDE?</span>';
  } else if (action && action.type === 'pick') {
    cls += ' picked'; state = `Пик · ${esc(tn(m, action.team))}`;
    if (sideAct) state += ` <span class="side-chip ${sideAct.side}">${sideAct.side} ${esc(tn(m, sideAct.team))}</span>`;
    tag = '<span class="tag pick">PICK</span>';
  } else if (isDecider) {
    cls += ' decider'; state = 'Решающая карта';
    tag = '<span class="tag dec">DECIDER</span>';
  } else if (clickable) {
    cls += ' clickable ' + (m.currentStep.type === 'ban' ? 'mode-ban' : 'mode-pick');
    state = m.currentStep.type === 'ban' ? 'Нажмите — забанить' : 'Нажмите — пикнуть';
  }

  return `
    <div class="${cls}" ${clickable ? `onclick="doAction('${mp.id}', this)"` : ''}>
      ${tag}
      <div class="art" style="background-image:url('${MAP_IMG(mp.id)}')">
        <div class="art-img"></div>
        <div class="sheen"></div>
      </div>
      <div class="name">${mp.name}</div>
      <div class="state">${state}</div>
    </div>`;
}

/* основное тело veto: статус, таймлайн, карты, история */
function vetoBodyHTML(m, animate, readOnly) {
  const mapName = id => m.mapPool.find(x => x.id === id).name;
  let status = '';

  if (m.status === 'veto') {
    const step = m.currentStep;
    if (step.type === 'side') {
      const onMap = m.sideForMap ? mapName(m.sideForMap) : '';
      if (m.yourTurn && !readOnly) {
        status = `
          <div class="status-bar me"><span class="pulse"></span>Соперники пикнули ${onMap} — выберите, за какую сторону вы начнёте</div>
          <div class="side-pick">
            <button class="side-btn ct" onclick="doSide('CT')"><div class="s-big">CT</div></button>
            <button class="side-btn t" onclick="doSide('T')"><div class="s-big">T</div></button>
          </div>`;
      } else {
        status = `<div class="status-bar"><span class="pulse"></span>${esc(tn(m, step.team))} выбирают сторону на ${onMap}…</div>`;
      }
    } else {
      const verb = step.type === 'ban' ? 'банят' : 'пикают';
      status = (m.yourTurn && !readOnly)
        ? `<div class="status-bar me"><span class="pulse"></span>Ваш ход — ${step.type === 'ban' ? 'нажмите на карту, которую хотите убрать' : 'нажмите на карту, которую хотите сыграть'}</div>`
        : `<div class="status-bar"><span class="pulse"></span>${esc(tn(m, step.team))} ${verb} карту…</div>`;
    }
  } else {
    status = `<div class="status-bar me">VETO завершён</div>`;
    status += `<p style="text-align:center;margin-top:14px;"><button class="btn quiet" onclick="showFinalOverlay(window.__lastMatch)">Показать итог</button></p>`;
  }

  const log = m.actions.length ? `
    <div class="history">
      <h2 class="section" style="font-size:18px;">История</h2>
      ${m.actions.map((a, i) => `
        <div class="h-item">
          <span class="idx">${i + 1}</span>
          <span><b>${esc(tn(m, a.team))}</b>
          ${a.type === 'side'
            ? `<span class="act-side">выбрали сторону ${a.side}</span> на <b>${mapName(a.map)}</b>`
            : `<span class="act-${a.type}">${a.type === 'ban' ? 'забанили' : 'пикнули'}</span> <b>${mapName(a.map)}</b>`}
          </span>
        </div>`).join('')}
    </div>` : '';

  window.__lastMatch = m;

  return `
    <div class="card">
      ${status}
      ${timelineHTML(m)}
      <div class="progress"><i style="width:${(m.stepIndex / m.totalSteps) * 100}%"></i></div>
      <div class="maps ${animate ? 'stagger' : ''}">${m.mapPool.map(mp => mapCard(mp, m, readOnly)).join('')}</div>
      ${log}
    </div>`;
}

/* ------------------------------------------------ Финальный оверлей */
function maybeShowFinal(m) {
  if (m.status === 'done' && !finalShown) {
    finalShown = true;
    const coin = (m.finalMaps || []).find(f => f.coin && f.sideTeam);
    if (coin) {
      // сначала полноэкранный бросок монетки, затем итоги
      setTimeout(() => showCoinToss(m, coin), 500);
    } else {
      setTimeout(() => showFinalOverlay(m), 600);
    }
  }
}

/* ------------------------------------------------ Полноэкранный бросок монетки */
function showCoinToss(m, coin) {
  const mapName = id => m.mapPool.find(x => x.id === id).name;
  const ov = $('#coin-overlay');
  const winSide = coin.side; // 'CT' | 'T'
  // Пока монета крутится — на обеих гранях «?», интрига сохраняется.
  // Выпавшая сторона проявится только в момент приземления.
  ov.innerHTML = `
    <div class="co-kicker">Бросок монетки · решающая карта ${mapName(coin.map)}</div>
    <div class="co-teams">
      <span>${esc(m.teamA.name)}</span><span class="co-x">VS</span><span>${esc(m.teamB.name)}</span>
    </div>
    <div class="co-stage">
      <div class="co-coin" id="co-coin">
        <div class="co-face front" id="co-front">?</div>
        <div class="co-face back">?</div>
      </div>
      <div class="co-shadow"></div>
    </div>
    <div class="co-result" id="co-result">
      <div class="cr-main">${esc(tn(m, coin.sideTeam))} начинают за <span class="side-chip ${winSide}">${winSide}</span></div>
      <div class="cr-sub">на решающей карте ${mapName(coin.map)}</div>
    </div>`;
  ov.classList.add('open');

  // запускаем подброс после открытия оверлея
  const coinEl = document.getElementById('co-coin');
  setTimeout(() => coinEl.classList.add('tossing'), 350);
  // в последней фазе полёта (грань уже не разглядеть) подменяем «?» на результат
  setTimeout(() => {
    const front = document.getElementById('co-front');
    front.textContent = winSide;
    front.classList.add('revealed');
  }, 350 + 1900);
  // приземление: вспышка + показ результата
  setTimeout(() => {
    coinEl.classList.add('landed');
    document.getElementById('co-result').classList.add('show');
  }, 350 + 2600);
  // плавно закрываем монетку и открываем итоги
  setTimeout(() => {
    ov.classList.remove('open');
    showFinalOverlay(m);
  }, 350 + 2600 + 4000);
}
function showFinalOverlay(m) {
  if (!m || !m.finalMaps) return;
  const mapName = id => m.mapPool.find(x => x.id === id).name;
  const ov = $('#final-overlay');
  ov.innerHTML = `
    <div class="final-inner">
      <div class="f-kicker">VETO ЗАВЕРШЁН</div>
      <div class="f-title">Карты определены</div>
      <div class="f-vs">
        <span class="f-team">${logoHTML(m.teamA.logo, 's56', m.teamA.name)}${esc(m.teamA.name)}</span>
        <span class="f-x">VS</span>
        <span class="f-team">${logoHTML(m.teamB.logo, 's56', m.teamB.name)}${esc(m.teamB.name)}</span>
      </div>
      <div>
        ${m.finalMaps.map((f, i) => {
          let sub;
          if (f.pickedBy === 'decider') {
            sub = f.sideTeam
              ? `Решающая карта · монетка: ${esc(tn(m, f.sideTeam))} за ${f.side}`
              : 'Решающая карта';
          } else {
            const other = f.side === 'CT' ? 'T' : 'CT';
            const otherTeam = f.sideTeam === 'A' ? 'B' : 'A';
            sub = `Пик ${esc(tn(m, f.pickedBy))}` + (f.sideTeam
              ? ` · ${esc(tn(m, f.sideTeam))} за ${f.side}, ${esc(tn(m, otherTeam))} за ${other}`
              : '');
          }
          return `
            <div class="f-map">
              <span class="fm-num">${i + 1}</span>
              <span class="fm-img" style="background-image:url('${MAP_IMG(f.map)}')"></span>
              <span>
                <div class="fm-name">${mapName(f.map)}</div>
                <div class="fm-sub">${sub}</div>
              </span>
            </div>`;
        }).join('')}
      </div>
      <div class="f-close"><button class="btn" onclick="$('#final-overlay').classList.remove('open')">Закрыть</button></div>
    </div>`;
  ov.classList.add('open');
}

/* ------------------------------------------------ Действия капитана */
/* Оптимистичная анимация: карточка плавно перекрашивается СРАЗУ по клику,
   и только после ответа сервера страница перерисовывается */
function animateCardNow(card, type, who) {
  if (!card) return;
  card.classList.remove('clickable', 'mode-ban', 'mode-pick');
  card.removeAttribute('onclick');
  card.classList.add('acted', type === 'ban' ? 'banned' : 'picked');
  // штамп BAN/PICK с фирменной анимацией stamp
  const tag = document.createElement('span');
  tag.className = 'tag ' + (type === 'ban' ? 'ban' : 'pick');
  tag.textContent = type === 'ban' ? 'BAN' : 'PICK';
  card.appendChild(tag);
  const state = card.querySelector('.state');
  if (state) state.innerHTML = (type === 'ban' ? 'Бан' : 'Пик') + (who ? ' · ' + who : '');
}

async function doAction(mapId, card) {
  const type = window.__lastMatch && window.__lastMatch.currentStep ? window.__lastMatch.currentStep.type : 'ban';
  const who = window.__lastMatch ? tn(window.__lastMatch, window.__lastMatch.myTeam) : '';
  animateCardNow(card, type, who);
  try {
    const m = await api(`/api/veto/${captainToken}/action`, { method: 'POST', body: { map: mapId } });
    lastRenderKey = renderKeyOf(m);
    maybeShowFinal(m);
    // даём анимации доиграть, затем синхронизируемся с сервером
    setTimeout(() => setPageInstant(captainHTML(m, false)), 520);
  } catch (e) {
    toast(e.message);
    // откат: перерисовать актуальное состояние
    try {
      const m = await api('/api/veto/' + captainToken);
      setPageInstant(captainHTML(m, false));
    } catch (e2) {}
  }
}
async function doSide(side) {
  try {
    const m = await api(`/api/veto/${captainToken}/action`, { method: 'POST', body: { side } });
    lastRenderKey = renderKeyOf(m);
    maybeShowFinal(m);
    setPageInstant(captainHTML(m, false));
  } catch (e) { toast(e.message); }
}

/* ------------------------------------------------ Роутинг + старт */
(async () => {
  const [meResp, cfg] = await Promise.all([api('/api/me'), api('/api/config')]);
  me = meResp.user ? meResp.user.username : null;
  myAvatar = meResp.user ? (meResp.user.avatar || 0) : 0;
  googleClientId = cfg.googleClientId;
  renderUserbox();

  const path = location.pathname;
  const mVeto = path.match(/^\/veto\/([a-f0-9]{32})$/);
  const mWatch = path.match(/^\/watch\/([A-Za-z0-9]+)$/);
  if (mVeto) return openCaptain(mVeto[1]);
  if (mWatch) return openSpectate(mWatch[1]);
  me ? renderDashboard() : renderAuth();
})();
</script>
